name: DB Backup → Cloudflare R2

# Sprint 1 — Anti-desastre.
# Backup secundario a Cloudflare R2. La capa primaria son los Snapshots
# nativos de Neon (Console → Backup & Restore). Este workflow garantiza
# un dump portable fuera de Neon como defensa en profundidad.
#
# Schedule: 4:00 AM AST (8:00 UTC) — ventana de baja actividad en Vivid.
# A esa hora el plan Scale (max_connections=112) tiene ~10-15 conexiones
# activas vs ~80+ durante el día, lo que evita el error "remaining
# connection slots reserved for SUPERUSER" causado por agotamiento.
#
# Retención: 30 días (cleanup automático al final).
# Trigger manual disponible vía workflow_dispatch para testing.

on:
  schedule:
    # 4:00 AM AST = 8:00 UTC (PR no tiene DST)
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag opcional para el backup (ej: pre-migration, before-upgrade)'
        required: false
        default: 'manual'

jobs:
  backup:
    name: Backup PostgreSQL → R2
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Install PostgreSQL 17 client
        # Neon corre PG 17 — el pg_dump del sistema (PG 16) falla por version mismatch.
        # NO instalamos awscli vía apt — el paquete ya no existe en repos recientes.
        # En su lugar usamos el AWS CLI v2 que viene preinstalado en ubuntu-latest.
        run: |
          sudo apt-get update -qq
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
            https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-17 > /dev/null
          pg_dump --version
          psql --version
          aws --version  # preinstalado en ubuntu-latest

      - name: Generate backup filename
        id: filename
        run: |
          DATE=$(date -u +"%Y-%m-%d_%H-%M-%S")
          TAG="${{ github.event.inputs.tag || 'daily' }}"
          echo "name=zendity-prod-${DATE}-${TAG}.sql.gz" >> $GITHUB_OUTPUT

      - name: Dump database with retry + backoff
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -uo pipefail

          if [ -z "$DATABASE_URL" ]; then
            echo "❌ DATABASE_URL no configurado en GitHub Secrets"
            exit 1
          fi

          # ── Conexión directa (sin -pooler) ─────────────────────────────
          # El pooler (pgbouncer) bloquea pg_dump. Usamos la URL directa.
          DIRECT_URL=$(echo "$DATABASE_URL" | sed 's/-pooler//')
          echo "→ Pooler URL : $(echo "$DATABASE_URL" | sed 's|://[^@]*@|://***@|')"
          echo "→ Direct URL : $(echo "$DIRECT_URL"   | sed 's|://[^@]*@|://***@|')"

          # ── Pre-flight: cuántas conexiones activas hay ────────────────
          # Si Neon tiene >90 conexiones activas (de ~112 max), el slot
          # para pg_dump probablemente esté tomado. Esperamos 90s antes
          # de intentar para darle tiempo al app de liberar conexiones.
          echo ""
          echo "──────────────────────────────────────────────────────"
          echo "PRE-FLIGHT CHECK: connection pool de Neon"
          echo "──────────────────────────────────────────────────────"
          ACTIVE=$(psql "$DIRECT_URL" -tAc \
            "SELECT count(*) FROM pg_stat_activity WHERE state IS NOT NULL;" 2>/dev/null || echo "?")
          MAX=$(psql "$DIRECT_URL" -tAc \
            "SELECT current_setting('max_connections');" 2>/dev/null || echo "?")
          echo "Conexiones activas: $ACTIVE / $MAX"

          if [ "$ACTIVE" != "?" ] && [ "$ACTIVE" -gt 90 ]; then
            echo "⚠️  Pool saturado (>90). Esperando 90s antes del primer intento..."
            sleep 90
          fi

          # ── pg_dump con retry + backoff exponencial ───────────────────
          # Hasta 5 intentos: 60s, 120s, 180s, 240s entre fallos.
          # Cada intento intenta el dump completo desde cero (no incremental).
          # Tamaño mínimo aceptable: 10 KB (un dump real >300 KB comprimido).
          MAX_ATTEMPTS=5
          MIN_BYTES=10000
          SUCCESS=0

          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo ""
            echo "──────────────────────────────────────────────────────"
            echo "INTENTO $i / $MAX_ATTEMPTS"
            echo "──────────────────────────────────────────────────────"

            # Limpia archivo previo si existe (intento parcial)
            rm -f backup.sql.gz

            # Captura stderr para diagnóstico
            if pg_dump \
                --no-owner \
                --no-acl \
                --format=plain \
                --exclude-table=_prisma_migrations \
                "$DIRECT_URL" 2> /tmp/pg_dump_err.log | gzip -9 > backup.sql.gz; then
              :
            else
              echo "→ pg_dump retornó error. stderr:"
              cat /tmp/pg_dump_err.log | head -20
            fi

            BYTES=$(stat -c%s backup.sql.gz 2>/dev/null || echo 0)
            SIZE_HUMAN=$(du -h backup.sql.gz 2>/dev/null | cut -f1)
            echo "→ Tamaño del dump: $SIZE_HUMAN ($BYTES bytes)"

            if [ "$BYTES" -gt "$MIN_BYTES" ]; then
              echo "✅ Dump válido en intento $i"
              SUCCESS=1
              break
            fi

            if [ $i -lt $MAX_ATTEMPTS ]; then
              WAIT=$((i * 60))
              echo "⚠️  Dump insuficiente (<$MIN_BYTES bytes)."
              echo "    Probable causa: connection slots saturados."
              echo "    Esperando ${WAIT}s antes del próximo intento..."
              sleep $WAIT
            fi
          done

          if [ "$SUCCESS" -ne 1 ]; then
            echo ""
            echo "═════════════════════════════════════════════════════════"
            echo "❌ Backup R2 falló tras $MAX_ATTEMPTS intentos."
            echo ""
            echo "Causa probable: connection slots de Neon saturados durante"
            echo "toda la ventana de retry. El plan Scale tiene max=112 y la"
            echo "app+crons consumen ~80 normalmente."
            echo ""
            echo "🛟 Snapshot de Neon (Console → Backup & Restore) sigue"
            echo "activo como respaldo primario. Verifica que esté configurado."
            echo "═════════════════════════════════════════════════════════"
            exit 1
          fi

      - name: Verify backup contents
        run: |
          # Inspecciona la primera línea del dump (decomprimida) para
          # confirmar que es un dump válido de Postgres.
          FIRST_LINE=$(gunzip -c backup.sql.gz | head -1)
          if [[ "$FIRST_LINE" != *"PostgreSQL database dump"* ]]; then
            echo "❌ El archivo no parece un pg_dump válido"
            echo "Primera línea: $FIRST_LINE"
            exit 1
          fi
          echo "✅ Dump verificado"

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          if [ -z "$R2_ACCOUNT_ID" ] || [ -z "$R2_BUCKET" ]; then
            echo "❌ R2_ACCOUNT_ID o R2_BUCKET no configurados"
            exit 1
          fi

          aws s3 cp backup.sql.gz \
            "s3://${R2_BUCKET}/${{ steps.filename.outputs.name }}" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --checksum-algorithm CRC32

          echo "✅ Subido a R2: ${{ steps.filename.outputs.name }}"

      - name: Cleanup old backups (>30 días)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          # Lista todos los backups y borra los > 30 días.
          CUTOFF=$(date -u -d '30 days ago' +%Y-%m-%d)
          echo "→ Cutoff date: $CUTOFF"

          aws s3 ls "s3://${R2_BUCKET}/" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            | awk '{print $4}' \
            | grep -E "^zendity-prod-" \
            | while read filename; do
                # Extrae fecha del filename: zendity-prod-2026-05-22_...
                FILE_DATE=$(echo "$filename" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}' | head -1)
                if [ -n "$FILE_DATE" ] && [[ "$FILE_DATE" < "$CUTOFF" ]]; then
                  echo "  Eliminando $filename (de $FILE_DATE)"
                  aws s3 rm "s3://${R2_BUCKET}/$filename" \
                    --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
                fi
              done

          echo "✅ Limpieza completa"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Backup R2 falló — revisar logs en GitHub Actions"
          echo ""
          echo "Esto NO es una emergencia inmediata porque:"
          echo "  • Snapshot de Neon (capa primaria) sigue activo"
          echo "  • PITR de Neon disponible para últimas 2 días"
          echo ""
          echo "Próximos pasos:"
          echo "  1. Revisar Neon Console → Backup & Restore → verificar snapshots recientes"
          echo "  2. Reintentar workflow manual (workflow_dispatch) en otra hora"
          echo "  3. Si persiste por 3+ días, escalar y considerar Opción 2 (branching)"
          # TODO: integrar SendGrid o Slack para notificación automática
