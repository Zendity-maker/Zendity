<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Zéndity — Limpiando sesión...</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0f172a; color: #94a3b8;
           display: flex; align-items: center; justify-content: center;
           height: 100vh; margin: 0; flex-direction: column; gap: 16px; }
    .spinner { width: 40px; height: 40px; border: 3px solid #1e293b;
               border-top-color: #0d9488; border-radius: 50%;
               animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p>Limpiando sesión...</p>
  <script>
    // Eliminar todas las cookies del dominio
    document.cookie.split(';').forEach(function(cookie) {
      var name = cookie.split('=')[0].trim();
      var domains = [window.location.hostname, '.' + window.location.hostname];
      var paths = ['/', '/api', '/care', '/corporate', '/hr', '/family', '/academy'];
      domains.forEach(function(domain) {
        paths.forEach(function(path) {
          document.cookie = name + '=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=' + path + '; domain=' + domain + ';';
          document.cookie = name + '=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=' + path + ';';
        });
      });
    });
    setTimeout(function() {
      window.location.href = '/login';
    }, 1500);
  </script>
</body>
</html>
